body {
	
    height:96%;
    width:98%;
    background-image:url("https://external-content.duckduckgo.com/iu/?u=http%3A%2F%2Fschools.thelearningpoint.net%2Fpics-cbse%2FschoolPic53006.JPG&f=1&nofb=1");

	filter:progid:DXImageTransform.Microsoft.AlphaImageLoader(src=".https://external-content.duckduckgo.com/iu/?u=http%3A%2F%2Fschools.thelearningpoint.net%2Fpics-cbse%2FschoolPic53006.JPG&f=1&nofb=1",sizingMethod='scale');
    -ms-
    filter:"progid:DXImageTransform.Microsoft.AlphaImageLoader(src="https://external-content.duckduckgo.com/iu/?u=http%3A%2F%2Fschools.thelearningpoint.net%2Fpics-cbse%2FschoolPic53006.JPG&f=1&nofb=1",sizingMethod='scale')";
}
</style>
<script type= "text/javascript">

async function loadNames() 
{
	document.getElementById("yahoo").innerHTML = '';
	let sheet=document.getElementById('exam').value;
	const response = await fetch("https://opensheet.elk.sh/162npxABqg9mLtP7ll9pmgDhfrKqCBVI9KiW5DcDWfKM/"+sheet);
	
	const data = await response.json();
	let f=0;
	for(i=0; i<data.length; i++)
	{
		if(data[i].Regd==document.getElementById('regd').value && data[i].Phno==document.getElementById('phno').value)
		{
			if(data[i].Publish=="no")
			{
				f=-2;
			}
			else if(data[i].Withheld=="no" && data[i].Publish=="yes")
			{
				var tab = "<table class='tab' >";
				for (let head in data[i])
				{
				if (data[i][head].length>0 && head!="Phno" && head!="Withheld" && head!="Publish")
				{
					tab = tab + "<tr><th align='left'>" + head + "</th><td>" + data[i][head] + "</td></tr>"; 
				}
				}
				tab = tab + "</table>";
				document.getElementById("yahoo").innerHTML = tab;
				f=1;
			}
			else if(data[i].Withheld=="yes")
			{
				f=-1;
			}
		
		}
		else if(data[i].Regd==document.getElementById('regd').value && data[i].Phno!=document.getElementById('phno').value)
		{
			f=2;
		}
	}
	if(f==0)
		alert("Your record is Not Found!\nVerify Registration Number(Write in Capital) and Exam.");
	else if(f==-1)
		alert("Your result is Withheld!\nContact Accounts office during school hours @ 8763366201.");
	else if(f==2)
		alert("Wrong Phone Number Entered!\nContact your Academic Incharge.");
	else if(f==-2)
		alert("This Result is NOT published!\nWait for the Notification.");
}
</script>
</head>
<body>
<div align="center">
<div class="header">
<h2><LOGO.jpeg/></h2>
<font size="6"
    face="arial black"
    color="blue">
    MODERN PUBLIC SCHOOL</font>
<br><br><U><font size="4"color="red"><b>RESULT DECLARATION PORTAL</b></font></U>
</div>
<br>
<form>
<table style="background : rgba(100,200,230,0); font-weight : bold;" cellspacing="8" cellpadding="5">
<tr>
<td bgcolor="#0A83D2"><font color="white">REGISTRATION NUMBER</font></td>
<td><input type = "text" name ="regd" id="regd" autocomplete="off" style="width:100%;"></td>
</tr>
<tr>
<td bgcolor="#0A83D2"><font color="white">REGISTERED PHONE NUMBER</font></td>
<td><input type = "text" name ="phno" id="phno" autocomplete="off" style="width:100%;"></td>
</tr>
<tr>
<td bgcolor="#0A83D2"><font color="white">SELECT EXAM</font></td>
<td>
<select id='exam'>
<option>Select Exam</option>
<option value="Periodic1">Periodic Test - I</option>
<option value="Periodic2">Periodic Test - II</option>
<option value="Periodic3">Periodic Test - III</option>
<option value="Terminal1">Terminal Exam - I</option> 
<option value="Terminal2">Terminal Exam - II</option>
<!--<option value="VST-1">V.S.T. 1 (Std X,XII)</option>-->
<!--<option value="VST-2">V.S.T. 2 (Std X,XII)</option>-->
<!--<option value="Olympiad">MPS Olympiad (Std I to VIII)</option>-->
<!--<option value="SUT">Subjective U.T. (XI,XII)</option>-->
<option value="Integrated">School Integrated (Std VI to X)</option>
<!--<option value="SIP">SIP-Career Point (Std XI,XII)</option>-->
</select>
</td>
</tr>
</table>
<br>
<input type="button" class='button' onclick="loadNames()" value="CHECK" />
<!--<input type="button" class='button' onclick="window.location.href=''" value="Report Issue" />-->
</form>
<div align="center" id="yahoo"></div>
<div style="position: absolute; bottom: 8px; center: 16px; font-weight:bold;font-size: 6px;">&#169; Modern Public School, Balasore, Odisha</div>
</div>
</body>
</html>
